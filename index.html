<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>안산 3D 실시간 메타버스 - 화면 이탈 방지 통합판</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>
    <style>
        body { margin:0; overflow: hidden; font-family: 'Malgun Gothic', sans-serif; background: #000; }
        #map { width:100vw; height:100vh; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .login-btn { padding: 15px 40px; margin: 15px; font-size: 20px; cursor: pointer; border-radius: 12px; border: none; font-weight: bold; }
        #ui { position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.85); color:white; padding:15px; border-radius:10px; z-index:2000; font-size:14px; border: 1px solid #444; pointer-events: none; }
        
        .player-container { display: flex; flex-direction: column; align-items: center; }
        .player-label { background: #fff; color: #000; padding: 3px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; border: 2px solid #333; }
        .player-dot { width: 22px; height: 22px; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(255,255,255,0.5); }
        
        #controls { position: fixed; bottom: 30px; right: 30px; display: grid; grid-template-columns: repeat(3, 75px); grid-template-rows: repeat(2, 75px); gap: 12px; z-index: 4000; }
        .control-btn { width: 75px; height: 75px; background: rgba(255, 255, 255, 0.3); border: 2px solid white; border-radius: 50%; color: white; font-size: 28px; display: flex; align-items: center; justify-content: center; user-select: none; cursor: pointer; }

        .quiz-window { position:absolute; bottom:130px; left: 50%; transform: translateX(-50%); background:white; color:black; padding:15px; display:none; z-index:4500; border-radius:15px; width: 240px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .quiz-window b { font-size: 15px; display: block; margin-bottom: 10px; color: #333; }
        .quiz-window input { padding: 8px; width: 85%; margin-top: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 12px; }
        .quiz-window button { padding: 4px 10px; margin-top: 10px; background: #333; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 10px; }
        .ref-link { display: inline-block; margin-top: 10px; color: #3b82f6; text-decoration: none; font-size: 10px; font-weight: bold; border: 1px solid #3b82f6; padding: 5px 10px; border-radius: 5px; }

        /* ✨ Orbit 마커 스타일 (입체 레드 테마) */
        .m-wrap { width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; }
        .p-3d-scene { width: 50px; height: 50px; perspective: 1000px; transform-style: preserve-3d; }
        .p-3d-body { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; animation: p-floating 4s infinite ease-in-out; }
        .core { position: absolute; top: 15px; left: 25px; transform-style: preserve-3d; animation: p-rot 5s infinite linear; }
        
        .p-side { position: absolute; width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 20px solid #ff4d4d; transform-origin: 50% 0%; filter: drop-shadow(0 0 5px #ff0000);}
        .s1 { transform: rotateY(0deg) rotateX(-163deg); border-bottom-color:#ff5f5f; }
        .s2 { transform: rotateY(120deg) rotateX(-163deg); border-bottom-color: #e60000; }
        .s3 { transform: rotateY(240deg) rotateX(-163deg); border-bottom-color: #b30000; }
        
        .ring { position: absolute; border: 3px solid rgba(255, 69, 0, 0.5); border-radius: 50%; box-sizing: border-box; box-shadow: 0 0 10px rgba(255, 0, 0, 0.3); top: 0; left: 0; right: 0; bottom: 0; margin: auto; }
        .ring-1 { width: 50px; height: 50px; animation: ring-rot-1 3s infinite linear; }
        .ring-2 { width: 38px; height: 38px; animation: ring-rot-2 2.5s infinite linear; border-color: rgba(255, 200, 200, 0.6); }
        
        @keyframes p-floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes p-rot { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }
        @keyframes ring-rot-1 { 0% { transform: rotateX(75deg) rotateZ(0deg); } 100% { transform: rotateX(75deg) rotateZ(360deg); } }
        @keyframes ring-rot-2 { 0% { transform: rotateY(75deg) rotateZ(0deg); } 100% { transform: rotateY(75deg) rotateZ(360deg); } }
    </style>
</head>
<body>

<div id="login-overlay">
    <h1>안산 3D 실시간 메타버스</h1>
    <p id="loading-text">데이터 로딩 중...</p>
    <div id="start-buttons" style="display:none;">
        <button class="login-btn" style="background: #3b82f6; color: white;" onclick="window.startGame(1)">Player1 입장</button>
        <button class="login-btn" style="background: #10b981; color: white;" onclick="window.startGame(2)">Player2 입장</button>
    </div>
</div>

<div id="ui">
    <div style="font-weight: bold; border-bottom: 1px solid #555; padding-bottom:5px; margin-bottom:5px;">📊 실시간 스코어</div>
    <div>P1 점수: <span id="score1">0</span></div>
    <div>P2 점수: <span id="score2">0</span></div>
    <div style="margin-top:5px; color:#aaa; font-size:12px;">조작: WASD / 화살표 / 버튼</div>
</div>

<div id="quiz-box" class="quiz-window">
    <div id="question-content">
        <b id="question-text">질문 로딩 중...</b>
        <div id="url-container"></div>
    </div>
    <input id="answer-input" placeholder="정답을 입력하세요" autocomplete="off">
    <br>
    <button onclick="window.submitAnswer()">확인</button>
</div>

<div id="controls">
    <div class="control-btn" onmousedown="window.startMove('up')" onmouseup="window.stopMove()" ontouchstart="window.startMove('up')" ontouchend="window.stopMove()" style="grid-column:2;">▲</div>
    <div class="control-btn" onmousedown="window.startMove('left')" onmouseup="window.stopMove()" ontouchstart="window.startMove('left')" ontouchend="window.stopMove()" style="grid-column:1; grid-row:2;">◀</div>
    <div class="control-btn" onmousedown="window.startMove('down')" onmouseup="window.stopMove()" ontouchstart="window.startMove('down')" ontouchend="window.stopMove()" style="grid-column:2; grid-row:2;">▼</div>
    <div class="control-btn" onmousedown="window.startMove('right')" onmouseup="window.stopMove()" ontouchstart="window.startMove('right')" ontouchend="window.stopMove()" style="grid-column:3; grid-row:2;">▶</div>
</div>

<div id="map"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSoS62NOsFroOTNIg4UdB90D1g-oGnlmnLNJtUGyjA-Fn9abB5IRnsyT2I0AJYS0Gj8abQrnuUS4Nbv/pub?gid=0&single=true&output=csv";
    const VWORLD_KEY = "6665AAE1-38F5-3EB9-B7C6-61D823C0EDD7";

    const firebaseConfig = {
        apiKey: "AIzaSyBuW2RPcG9_skuQ8tGOZhlDuyZY531D24Q",
        authDomain: "ansan-metaverse.firebaseapp.com",
        projectId: "ansan-metaverse",
        databaseURL: "https://ansan-3c688-default-rtdb.asia-southeast1.firebasedatabase.app/", 
        appId: "1:545430214732:web:0ddd03f8c7d43d9a00fce9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const map = new maplibregl.Map({
        container: "map",
        style: {
            "version": 8,
            "sources": {
                "vworld-sat": { "type": "raster", "tiles": [`https://api.vworld.kr/req/wmts/1.0.0/${VWORLD_KEY}/Satellite/{z}/{y}/{x}.jpeg`], "tileSize": 256 },
                "vworld-hyb": { "type": "raster", "tiles": [`https://api.vworld.kr/req/wmts/1.0.0/${VWORLD_KEY}/Hybrid/{z}/{y}/{x}.png`], "tileSize": 256 }
            },
            "layers": [
                { "id": "vworld-sat", "type": "raster", "source": "vworld-sat" },
                { "id": "vworld-hyb", "type": "raster", "source": "vworld-hyb" }
            ]
        },
        center: [126.8309, 37.3219],
        zoom: 18, pitch: 60, antialias: true
    });

    let myId = null, moveInterval = null, currentProblem = null, problems = [], activeKeys = new Set();
    let players = {
        1: { pos: { lng: 126.8309, lat: 37.3219 }, marker: null, score: 0 },
        2: { pos: { lng: 126.8329, lat: 37.3219 }, marker: null, score: 0 }
    };

    async function fetchQuizzes() {
        try {
            const res = await fetch(SHEET_URL + "&cb=" + Date.now());
            const text = await res.text();
            const rows = text.split("\n").map(row => row.split(","));
            for(let i=1; i<rows.length; i++) {
                const col = rows[i].map(c => c.replace(/"/g, '').trim());
                if(col.length < 5) continue;
                const lng = parseFloat(col[1]), lat = parseFloat(col[2]);
                if(!isNaN(lng) && !isNaN(lat)) {
                    const el = document.createElement("div");
                    el.className = "m-wrap";
                    el.innerHTML = `<div class="p-3d-scene"><div class="p-3d-body"><div class="ring ring-1"></div><div class="ring ring-2"></div><div class="core"><div class="p-side s1"></div><div class="p-side s2"></div><div class="p-side s3"></div></div></div></div>`;
                    new maplibregl.Marker({element: el, anchor: 'bottom'}).setLngLat([lng, lat]).addTo(map);
                    problems.push({ pos: {lng, lat}, q: col[3], a: col[4], url: col[5] || "", done: false });
                }
            }
            document.getElementById('loading-text').style.display = 'none';
            document.getElementById('start-buttons').style.display = 'block';
        } catch (e) { document.getElementById('loading-text').innerText = "데이터 로딩 오류!"; }
    }
    fetchQuizzes();

    function createMarker(id) {
        const el = document.createElement("div");
        el.className = "player-container";
        el.innerHTML = `<div class="player-label">P${id}</div><div class="player-dot" style="background:${id===1?'#3b82f6':'#10b981'}"></div>`;
        players[id].marker = new maplibregl.Marker({element: el}).setLngLat([players[id].pos.lng, players[id].pos.lat]).addTo(map);
    }
    createMarker(1); createMarker(2);

    window.startGame = function(id) {
        myId = id;
        document.getElementById('login-overlay').style.display = 'none';
        onValue(ref(db, 'players/'), (snap) => {
            const data = snap.val();
            if(!data) return;
            
            [1, 2].forEach(pId => {
                if(data[`p${pId}`]) {
                    players[pId].pos = { lng: data[`p${pId}`].lng, lat: data[`p${pId}`].lat };
                    players[pId].marker.setLngLat([players[pId].pos.lng, players[pId].pos.lat]);
                    document.getElementById(`score${pId}`).innerText = data[`p${pId}`].score || 0;
                    players[pId].score = data[`p${pId}`].score || 0;
                }
            });

            // ✨ [핵심 수정] 플레이어 추적 강화 로직
            const bounds = new maplibregl.LngLatBounds();
            bounds.extend([players[1].pos.lng, players[1].pos.lat]);
            bounds.extend([players[2].pos.lng, players[2].pos.lat]);

            map.fitBounds(bounds, {
                padding: 150,     // 여백을 넉넉히 주어 화면 가장자리에서 플레이어가 잘리지 않게 함
                maxZoom: 18,      
                duration: 200,    // 지도가 따라오는 시간을 줄여 즉각적으로 반응하게 함
                essential: true   // 애니메이션이 다른 조작에 의해 방해받지 않도록 설정
            });

            checkQuizDistance();
        });
    };

    const keyMap = {
        'ArrowUp': 'up', 'w': 'up', 'W': 'up',
        'ArrowDown': 'down', 's': 'down', 'S': 'down',
        'ArrowLeft': 'left', 'a': 'left', 'A': 'left',
        'ArrowRight': 'right', 'd': 'right', 'D': 'right'
    };

    window.addEventListener('keydown', (e) => {
        if (!myId || document.activeElement.tagName === 'INPUT') return;
        const dir = keyMap[e.key];
        if (dir && !activeKeys.has(dir)) {
            activeKeys.add(dir);
            updateMovement();
        }
    });

    window.addEventListener('keyup', (e) => {
        const dir = keyMap[e.key];
        if (dir) {
            activeKeys.delete(dir);
            updateMovement();
        }
    });

    function updateMovement() {
        if (moveInterval) clearInterval(moveInterval);
        if (activeKeys.size === 0) return;

        moveInterval = setInterval(() => {
            let p = players[myId].pos;
            const step = 0.00003;
            activeKeys.forEach(dir => {
                if(dir==='up') p.lat += step; if(dir==='down') p.lat -= step;
                if(dir==='left') p.lng -= step; if(dir==='right') p.lng += step;
            });
            update(ref(db, `players/p${myId}`), { lng: p.lng, lat: p.lat });
        }, 50);
    }

    window.startMove = (dir) => { activeKeys.add(dir); updateMovement(); };
    window.stopMove = () => { activeKeys.clear(); updateMovement(); };

    function checkQuizDistance() {
        if(!myId) return;
        let isNearAny = false;
        problems.forEach(p => {
            if(p.done) return;
            const dist = Math.sqrt(Math.pow(players[myId].pos.lng - p.pos.lng, 2) + Math.pow(players[myId].pos.lat - p.pos.lat, 2));
            if(dist < 0.0003) {
                isNearAny = true;
                currentProblem = p;
                document.getElementById("quiz-box").style.display = "block";
                document.getElementById("question-text").innerText = p.q;
                const urlContainer = document.getElementById("url-container");
                urlContainer.innerHTML = (p.url && p.url.startsWith('http')) ? `<a href="${p.url}" target="_blank" class="ref-link">🔗 참고 자료 확인하기</a>` : "";
            }
        });
        
        if(!isNearAny && currentProblem) {
            document.getElementById("quiz-box").style.display = "none";
            currentProblem = null;
        }
    }

    window.submitAnswer = function() {
        if(!currentProblem) return;
        const input = document.getElementById("answer-input").value.trim().replace(/\s/g, '');
        const correct = currentProblem.a.trim().replace(/\s/g, '');
        if(input === correct) {
            alert("정답입니다! 🎉");
            update(ref(db, `players/p${myId}`), { score: (players[myId].score || 0) + 10 });
            currentProblem.done = true;
            document.getElementById("quiz-box").style.display = "none";
            currentProblem = null;
        } else { alert(`오답입니다!`); }
        document.getElementById("answer-input").value = "";
    };
</script>
</body>
</html>
